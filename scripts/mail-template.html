<div style="font-family: sans-serif; max-width: 600px; margin: auto; border: 1px solid #eee; border-radius: 10px; padding: 20px;">
  <h2 style="color: {{color}};">Proyecto: {{project}}</h2>
  <hr />
  <p><strong>Resultado:</strong> {{status}}</p>
  <p><strong>Stage:</strong> {{stage}}</p>
  <p><strong>Build Number:</strong> #{{buildId}}</p>
  <div style="background: #f9f9f9; padding: 10px; border-radius: 5px;">
    <p style="font-size: 12px; color: #666;">Commit log:</p>
    <code>{{commitMsg}}</code>
  </div>
  <br />
  <a href="{{url}}" style="background: {{color}}; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Ver en Jenkins</a>
</div>
